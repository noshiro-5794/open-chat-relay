services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      OPEN_CHAT_RELAY_DATABASE_URL: postgresql+asyncpg://openchatrelay:${OPEN_CHAT_RELAY_POSTGRES_PASSWORD:-openchatrelay}@postgres:5432/openchatrelay
      OPEN_CHAT_RELAY_REDIS_URL: redis://redis:6379/0
      OPEN_CHAT_RELAY_S3_ENDPOINT_URL: http://minio:9000
      OPEN_CHAT_RELAY_S3_PUBLIC_ENDPOINT_URL: ${OPEN_CHAT_RELAY_S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
      OPEN_CHAT_RELAY_S3_ACCESS_KEY_ID: ${OPEN_CHAT_RELAY_S3_ACCESS_KEY_ID:-openchatrelay}
      OPEN_CHAT_RELAY_S3_SECRET_ACCESS_KEY: ${OPEN_CHAT_RELAY_S3_SECRET_ACCESS_KEY:-openchatrelay-secret}
      OPEN_CHAT_RELAY_S3_BUCKET: open-chat-relay
      OPEN_CHAT_RELAY_RATE_LIMIT_BACKEND: redis
      OPEN_CHAT_RELAY_PRESENCE_BACKEND: redis
      OPEN_CHAT_RELAY_TYPING_BACKEND: redis
      OPEN_CHAT_RELAY_CORS_ORIGINS: ${OPEN_CHAT_RELAY_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      OPEN_CHAT_RELAY_WEBTRANSPORT_ENABLED: ${OPEN_CHAT_RELAY_WEBTRANSPORT_ENABLED:-false}
      OPEN_CHAT_RELAY_WEBTRANSPORT_URL: ${OPEN_CHAT_RELAY_WEBTRANSPORT_URL:-https://localhost:8081/v1/wt}
      OPEN_CHAT_RELAY_WEBTRANSPORT_HEALTH_URL: ${OPEN_CHAT_RELAY_WEBTRANSPORT_HEALTH_URL:-http://webtransport-gateway:8080/ready}
      OPEN_CHAT_RELAY_GATEWAY_INTERNAL_TOKEN: ${OPEN_CHAT_RELAY_GATEWAY_INTERNAL_TOKEN:-change-this-local-gateway-token}
      OPEN_CHAT_RELAY_RUN_MIGRATIONS: "true"
    ports:
      - "${OPEN_CHAT_RELAY_API_BIND_HOST:-0.0.0.0}:${OPEN_CHAT_RELAY_API_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  outbox-worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      OPEN_CHAT_RELAY_DATABASE_URL: postgresql+asyncpg://openchatrelay:${OPEN_CHAT_RELAY_POSTGRES_PASSWORD:-openchatrelay}@postgres:5432/openchatrelay
      OPEN_CHAT_RELAY_REDIS_URL: redis://redis:6379/0
      OPEN_CHAT_RELAY_RUN_MIGRATIONS: "false"
      OPEN_CHAT_RELAY_S3_ENDPOINT_URL: http://minio:9000
      OPEN_CHAT_RELAY_S3_PUBLIC_ENDPOINT_URL: ${OPEN_CHAT_RELAY_S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
      OPEN_CHAT_RELAY_S3_ACCESS_KEY_ID: ${OPEN_CHAT_RELAY_S3_ACCESS_KEY_ID:-openchatrelay}
      OPEN_CHAT_RELAY_S3_SECRET_ACCESS_KEY: ${OPEN_CHAT_RELAY_S3_SECRET_ACCESS_KEY:-openchatrelay-secret}
      OPEN_CHAT_RELAY_S3_BUCKET: open-chat-relay
    command: [".venv/bin/python", "-m", "app.workers.outbox_publisher"]
    depends_on:
      api:
        condition: service_healthy

  console:
    build:
      context: .
      dockerfile: apps/console/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      OPEN_CHAT_RELAY_CONSOLE_API_BASE_URL: ${OPEN_CHAT_RELAY_CONSOLE_API_BASE_URL:-http://localhost:8000}
      OPEN_CHAT_RELAY_CONSOLE_BIND_HOST: 0.0.0.0
      OPEN_CHAT_RELAY_CONSOLE_PORT: 8080
    ports:
      - "${OPEN_CHAT_RELAY_CONSOLE_BIND_HOST:-127.0.0.1}:${OPEN_CHAT_RELAY_CONSOLE_HOST_PORT:-5173}:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  webtransport-gateway:
    build:
      context: .
      dockerfile: gateways/webtransport/Dockerfile
    profiles: ["webtransport"]
    env_file:
      - path: .env
        required: false
    environment:
      OPEN_CHAT_RELAY_API_BASE_URL: http://api:8000
      OPEN_CHAT_RELAY_GATEWAY_INTERNAL_TOKEN: ${OPEN_CHAT_RELAY_GATEWAY_INTERNAL_TOKEN:-change-this-local-gateway-token}
      OPEN_CHAT_RELAY_GATEWAY_BIND_HOST: 0.0.0.0
      OPEN_CHAT_RELAY_GATEWAY_PORT: 8080
      OPEN_CHAT_RELAY_GATEWAY_WEBTRANSPORT_RUNTIME_ENABLED: ${OPEN_CHAT_RELAY_GATEWAY_WEBTRANSPORT_RUNTIME_ENABLED:-false}
      OPEN_CHAT_RELAY_GATEWAY_WEBTRANSPORT_CERT_PATH: ${OPEN_CHAT_RELAY_GATEWAY_WEBTRANSPORT_CERT_PATH:-/certs/webtransport.crt}
      OPEN_CHAT_RELAY_GATEWAY_WEBTRANSPORT_KEY_PATH: ${OPEN_CHAT_RELAY_GATEWAY_WEBTRANSPORT_KEY_PATH:-/certs/webtransport.key}
      OPEN_CHAT_RELAY_GATEWAY_WEBTRANSPORT_SECRET: ${OPEN_CHAT_RELAY_GATEWAY_WEBTRANSPORT_SECRET:-change-this-local-webtransport-secret}
    volumes:
      - ${OPEN_CHAT_RELAY_WEBTRANSPORT_CERTS_DIR:-./local/certs}:/certs:ro
    ports:
      - "${OPEN_CHAT_RELAY_WEBTRANSPORT_GATEWAY_TCP_BIND_HOST:-127.0.0.1}:${OPEN_CHAT_RELAY_WEBTRANSPORT_GATEWAY_TCP_HOST_PORT:-8081}:8080/tcp"
      - "${OPEN_CHAT_RELAY_WEBTRANSPORT_GATEWAY_UDP_BIND_HOST:-127.0.0.1}:${OPEN_CHAT_RELAY_WEBTRANSPORT_GATEWAY_UDP_HOST_PORT:-8081}:8080/udp"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/ready').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: openchatrelay
      POSTGRES_USER: openchatrelay
      POSTGRES_PASSWORD: ${OPEN_CHAT_RELAY_POSTGRES_PASSWORD:-openchatrelay}
    ports:
      - "${OPEN_CHAT_RELAY_POSTGRES_BIND_HOST:-127.0.0.1}:${OPEN_CHAT_RELAY_POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openchatrelay -d openchatrelay"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "${OPEN_CHAT_RELAY_REDIS_BIND_HOST:-127.0.0.1}:${OPEN_CHAT_RELAY_REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OPEN_CHAT_RELAY_S3_ACCESS_KEY_ID:-openchatrelay}
      MINIO_ROOT_PASSWORD: ${OPEN_CHAT_RELAY_S3_SECRET_ACCESS_KEY:-openchatrelay-secret}
    ports:
      - "${OPEN_CHAT_RELAY_MINIO_BIND_HOST:-127.0.0.1}:${OPEN_CHAT_RELAY_MINIO_HOST_PORT:-9000}:9000"
      - "${OPEN_CHAT_RELAY_MINIO_CONSOLE_BIND_HOST:-127.0.0.1}:${OPEN_CHAT_RELAY_MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc alias set local http://minio:9000 "${OPEN_CHAT_RELAY_S3_ACCESS_KEY_ID:-openchatrelay}" "${OPEN_CHAT_RELAY_S3_SECRET_ACCESS_KEY:-openchatrelay-secret}"; do
          sleep 1
        done
        mc mb --ignore-existing "local/${OPEN_CHAT_RELAY_S3_BUCKET:-open-chat-relay}"
    environment:
      MINIO_ROOT_USER: ${OPEN_CHAT_RELAY_S3_ACCESS_KEY_ID:-openchatrelay}
      MINIO_ROOT_PASSWORD: ${OPEN_CHAT_RELAY_S3_SECRET_ACCESS_KEY:-openchatrelay-secret}
      OPEN_CHAT_RELAY_S3_BUCKET: ${OPEN_CHAT_RELAY_S3_BUCKET:-open-chat-relay}

volumes:
  postgres-data:
  redis-data:
  minio-data:
